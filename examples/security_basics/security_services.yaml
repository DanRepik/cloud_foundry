openapi: 3.0.0
info:
  title: Authorization Services API
  description: API for basic authorization services including signup, login, logout, and token refresh.
  version: 1.0.0
paths:
  /signup:
    post:
      summary: Signup a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  example: Password123!
                email:
                  type: string
                  example: johndoe@example.com
                nickName:
                  type: string
                  example: Jon D
      responses:
        '200':
          description: Signup successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Signup successful
        '400':
          description: Signup failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: An error occurred
  /login:
    post:
      summary: Login a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  example: Password123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id_token:
                    type: string
                    example: eyJraWQiOiJr...
                  access_token:
                    type: string
                    example: eyJraWQiOiJr...
                  refresh_token:
                    type: string
                    example: eyJraWQiOiJr...
        '400':
          description: Login failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: An error occurred
  /logout:
    post:
      summary: Logout a user
      security:
      - auth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout successful
        '400':
          description: Logout failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: An error occurred
  /refresh-token:
    post:
      summary: Refresh tokens
      description: Refresh the access token and optionally the refresh token using the provided refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: johndoe
                refresh_token:
                  type: string
                  example: eyJraWQiOiJr...
      responses:
        '200':
          description: Token refresh successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJraWQiOiJr...
                  id_token:
                    type: string
                    example: eyJraWQiOiJr...
                  refresh_token:
                    type: string
                    example: eyJraWQiOiJr...
                  groups:
                    type: array
                    items:
                      type: string
                    example: ["admin", "user"]
        '400':
          description: Token refresh failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: An error occurred
components:
  schemas:
    SignupRequest:
      type: object
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: Password123!
        email:
          type: string
          example: johndoe@example.com
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: Password123!
    LogoutRequest:
      type: object
      properties:
        access_token:
          type: string
          example: eyJraWQiOiJr...
    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
          example: eyJraWQiOiJr...
    RefreshTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJraWQiOiJr...
        id_token:
          type: string
          example: eyJraWQiOiJr...
        refresh_token:
          type: string
          example: eyJraWQiOiJr...
        groups:
          type: array
          items:
            type: string
          example: ["admin", "user"]
